  JWT_SECRET_KEY: cb7a7dd52e4ac6a22a843946ac9d5332b3ea7a0f540962a479517ff4e2be8972
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_SECRET: e18a7dd9f2e86981a199cdd4fd493658bf1869f39b3c8c3f7d7f3837277309cf
  JWT_REFRESH_SECRET_KEY: e18a7dd9f2e86981a199cdd4fd493658bf1869f39b3c8c3f7d7f3837277309cf
  JWT_REFRESH_EXPIRES_IN: 7d
  EMAIL_VERIFY_TTL_HOURS: 24
