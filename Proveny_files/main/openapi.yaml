openapi: "3.0.3"
info:
  title: Proveny API
  description: |
    Anti-Plagiarism Code Forensics Platform API.
    Establishes proctored authentic baselines and detects AI-assisted code generation
    through sophistication delta analysis, technique genealogy validation, and cohort comparison.
  version: "1.0.0"
  contact:
    name: Proveny Support
    email: support@Proveny.io

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.Proveny.io/v1
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: Users
    description: User management (Admin only)
  - name: Courses
    description: Course and cohort management
  - name: Sessions
    description: Proctored baseline session management
  - name: Baselines
    description: Week 1 immutable baseline records
  - name: Assignments
    description: Assignment management
  - name: Submissions
    description: Code submission and analysis
  - name: Analysis
    description: Forensic analysis results
  - name: Queue
    description: Instructor action queue
  - name: Reports
    description: Export and reporting

paths:

  # ============================================================
  # AUTH
  # ============================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new student and enqueue verification email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
            example:
              email: "student@university.edu"
              password: "SecurePass123!"
              firstName: "Amir"
              lastName: "Seitkali"
      responses:
        "201":
          description: Registration successful; email verification is required before login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Registration successful. Please check your email to verify your account before logging in."
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "instructor@university.edu"
              password: "SecurePass123!"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expiresIn: 900
                user:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: "instructor@university.edu"
                  role: "INSTRUCTOR"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
            example:
              refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: New access token and rotated refresh token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke all refresh tokens for the authenticated user
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify account via emailed link (query token)
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Auth]
      summary: Verify account with token in request body (frontend form)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Enqueue a new verification email for an unverified account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification resend accepted
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Enqueue a password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Password reset request accepted
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with emailed token and revoke existing sessions
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset successful
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # USERS
  # ============================================================
  /users:
    get:
      tags: [Users]
      summary: List all users (Admin only)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortParam"
        - name: role
          in: query
          schema:
            type: string
            enum: [STUDENT, INSTRUCTOR, PROCTOR, ADMIN]
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Users]
      summary: Create a new user (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              email: "student@university.edu"
              password: "TempPass456!"
              firstName: "Amir"
              lastName: "Seitkali"
              role: "STUDENT"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags: [Users]
      summary: Update user (Admin only)
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # COURSES
  # ============================================================
  /courses:
    get:
      tags: [Courses]
      summary: List courses accessible to the current user
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortParam"
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCourses"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Courses]
      summary: Create a new course (Instructor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
            example:
              name: "Backend Development 2025"
              code: "CS301-2025"
              weeklyTargets:
                "1": 20
                "2": 25
                "3": 30
                "4": 35
                "5": 40
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /courses/{courseId}/enroll:
    post:
      tags: [Courses]
      summary: Enroll a student in a course (Instructor/Admin)
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId]
              properties:
                studentId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # SESSIONS (Proctored)
  # ============================================================
  /sessions:
    get:
      tags: [Sessions]
      summary: List proctored sessions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortParam"
        - name: courseId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [SCHEDULED, ACTIVE, LOCKED, CANCELLED]
      responses:
        "200":
          description: Paginated list of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSessions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Sessions]
      summary: Create a proctored baseline session (Instructor/Proctor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              courseId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              startTime: "2025-09-08T09:00:00Z"
              endTime: "2025-09-08T09:30:00Z"
              networkIsolated: true
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /sessions/{sessionId}/activate:
    post:
      tags: [Sessions]
      summary: Activate session - students can now join (Proctor only)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /sessions/{sessionId}/lock:
    post:
      tags: [Sessions]
      summary: Lock session - no further baseline submissions accepted (Proctor only)
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # BASELINES
  # ============================================================
  /baselines:
    post:
      tags: [Baselines]
      summary: Submit Week 1 baseline code (Student only, during active session)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sessionCode, file]
              properties:
                sessionCode:
                  type: string
                  example: "ABC123"
                file:
                  type: string
                  format: binary
                  description: JavaScript or TypeScript source file (max 5MB)
      responses:
        "201":
          description: Baseline submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaselineResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /baselines/{studentId}/{courseId}:
    get:
      tags: [Baselines]
      summary: Get baseline for a student in a course (Instructor/Admin or own baseline)
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Baseline details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaselineResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # ASSIGNMENTS
  # ============================================================
  /assignments:
    get:
      tags: [Assignments]
      summary: List assignments for a course
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortParam"
        - name: courseId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: weekNumber
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 16
      responses:
        "200":
          description: Paginated assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAssignments"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Assignments]
      summary: Create a new assignment (Instructor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
            example:
              courseId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              title: "Lab 4 - Error Handling & Service Layer"
              weekNumber: 4
              expectedScore: 45.0
              dueDate: "2025-10-05T23:59:00Z"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # SUBMISSIONS
  # ============================================================
  /submissions:
    get:
      tags: [Submissions]
      summary: List submissions for an assignment (Instructor) or own submissions (Student)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortParam"
        - name: assignmentId
          in: query
          schema:
            type: string
            format: uuid
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
        - name: riskLevel
          in: query
          schema:
            type: string
            enum: [NORMAL, MONITOR, FLAGGED, CRITICAL]
      responses:
        "200":
          description: Paginated submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSubmissions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Submissions]
      summary: Submit code for an assignment (Student only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [assignmentId, file]
              properties:
                assignmentId:
                  type: string
                  format: uuid
                file:
                  type: string
                  format: binary
                  description: JavaScript or TypeScript source file (max 5MB)
      responses:
        "201":
          description: Submission accepted and analysis triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ============================================================
  # ANALYSIS
  # ============================================================
  /analysis/{submissionId}:
    get:
      tags: [Analysis]
      summary: Get full forensic analysis report for a submission
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full forensic analysis report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResultResponse"
              example:
                id: "f1a2b3c4-d5e6-7890-abcd-ef1234567891"
                submissionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                trajectoryZScore: 3.2
                genealogyPenalty: 1.0
                cohortOutlierScore: 0.85
                ensembleScore: 2.45
                riskLevel: "FLAGGED"
                compressedWeeks: 8.3
                violations:
                  - technique: "circuit_breaker"
                    missingPrerequisites: ["decorator", "context_manager"]
                    penalty: 0.5
                  - technique: "dependency_injection"
                    missingPrerequisites: ["class_based_architecture"]
                    penalty: 0.5
                llmGuidance: "Ask the student to explain how the circuit breaker resets after a timeout..."
                interviewOutcome: "PENDING"
                analyzedAt: "2025-10-06T10:23:45Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /analysis/{submissionId}/outcome:
    patch:
      tags: [Analysis]
      summary: Record oral interview outcome (Instructor only)
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outcome]
              properties:
                outcome:
                  type: string
                  enum: [CLEARED, CONFIRMED_AI, ESCALATED]
                notes:
                  type: string
                  maxLength: 2000
            example:
              outcome: "CONFIRMED_AI"
              notes: "Student could not explain the circuit breaker logic or the decorator pattern used."
      responses:
        "200":
          description: Outcome recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /analysis/one-shot:
    post:
      tags: [Analysis]
      summary: One-shot comparison against Week 1 baseline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, courseId, weekNumber, rawCode]
              properties:
                studentId:
                  type: string
                  format: uuid
                courseId:
                  type: string
                  format: uuid
                weekNumber:
                  type: integer
                  minimum: 1
                  maximum: 16
                rawCode:
                  type: string
            example:
              studentId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              courseId: "b1b2c3d4-e5f6-7890-abcd-ef1234567890"
              weekNumber: 4
              rawCode: "async function run(){ try { await Promise.resolve(1); } catch(e){} }"
      responses:
        "200":
          description: One-shot metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  studentId: { type: string, format: uuid }
                  courseId: { type: string, format: uuid }
                  weekNumber: { type: integer }
                  baselineScore: { type: number }
                  expectedScore: { type: number }
                  currentScore: { type: number }
                  compressedWeeks: { type: number }
                  trajectoryZScore: { type: number }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

