  # ============================================================
  # REPORTS
  # ============================================================
  /reports/cohort:
    get:
      tags: [Reports]
      summary: Get cohort sophistication statistics for a week (Instructor only)
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: weekNumber
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Cohort statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CohortStatsResponse"
              example:
                courseId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                weekNumber: 4
                cohortSize: 32
                avg: 38.5
                stddev: 7.2
                p10: 28.0
                p50: 38.0
                p90: 51.0
                outlierThreshold: 51.0
                distribution:
                  - bucket: "0-20"
                    count: 2
                  - bucket: "21-40"
                    count: 18
                  - bucket: "41-60"
                    count: 10
                  - bucket: "61-80"
                    count: 2
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reports/audit:
    get:
      tags: [Reports]
      summary: List recent audit log entries (Admin only)
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        userId:
                          type: string
                          format: uuid
                          nullable: true
                        action:
                          type: string
                        resourceType:
                          type: string
                        resourceId:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reports/export:
    get:
      tags: [Reports]
      summary: Export course report as CSV (Instructor only)
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        "200":
          description: Export file
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ============================================================
# COMPONENTS
# ============================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Obtain via POST /auth/login. Include as: Authorization: Bearer <token>"

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for offset pagination
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        example: "-createdAt"
      description: "Sort field. Prefix with - for descending. Example: -createdAt, sophisticationScore"

  responses:
    BadRequest:
      description: Bad request — invalid parameters or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 400
            error: "Bad Request"
            message: "sessionCode must be a 6-character alphanumeric string"
    Unauthorized:
      description: Unauthorized — missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 401
            error: "Unauthorized"
            message: "Invalid or expired access token"
    Forbidden:
      description: Forbidden — insufficient role permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 403
            error: "Forbidden"
            message: "Only INSTRUCTOR role can perform this action"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 404
            error: "Not Found"
            message: "Submission with id 'abc-123' not found"
    Conflict:
      description: Conflict — resource already exists or state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 409
            error: "Conflict"
            message: "Student already has a baseline for this course"
    UnprocessableEntity:
      description: Unprocessable Entity — validation errors
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          example:
            statusCode: 422
            error: "Unprocessable Entity"
            message: "Validation failed"
            details:
              - field: "weekNumber"
                message: "weekNumber must be between 1 and 16"
              - field: "expectedScore"
                message: "expectedScore must be a number between 0 and 100"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 500
            error: "Internal Server Error"
            message: "An unexpected error occurred. Please try again later."

  schemas:

    ErrorResponse:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 87
        totalPages:
          type: integer
          example: 5

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token TTL in seconds
        user:
          $ref: "#/components/schemas/UserResponse"

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [STUDENT, INSTRUCTOR, PROCTOR, ADMIN]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, password, firstName, lastName, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        role:
          type: string
          enum: [STUDENT, INSTRUCTOR, PROCTOR, ADMIN]

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        isActive:
          type: boolean
        role:
          type: string
          enum: [STUDENT, INSTRUCTOR, PROCTOR, ADMIN]

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        instructorId:
          type: string
          format: uuid
        weeklyTargets:
          type: object
          additionalProperties:
            type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateCourseRequest:
      type: object
      required: [name, code, weeklyTargets]
      properties:
        name:
          type: string
          maxLength: 200
        code:
          type: string
          pattern: "^[A-Z]{2,6}[0-9]{3}-[0-9]{4}$"
        weeklyTargets:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 100

    PaginatedCourses:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CourseResponse"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    EnrollmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        enrolledAt:
          type: string
          format: date-time

    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        proctorId:
          type: string
          format: uuid
        sessionCode:
          type: string
          example: "ABC123"
        networkIsolated:
          type: boolean
        status:
          type: string
          enum: [SCHEDULED, ACTIVE, LOCKED, CANCELLED]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        lockedAt:
          type: string
          format: date-time
          nullable: true

    CreateSessionRequest:
      type: object
      required: [courseId, startTime, endTime]
      properties:
        courseId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        networkIsolated:
          type: boolean
          default: false

    PaginatedSessions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SessionResponse"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    AstMetrics:
      type: object
      description: 15+ AST-derived sophistication metrics
      properties:
        errorHandlingTier:
          type: integer
          minimum: 0
          maximum: 5
          description: "0=none, 1=basic try-catch, 3=specific exceptions, 5=custom hierarchies"
        architectureTier:
          type: integer
          minimum: 0
          maximum: 5
          description: "0=flat functions, 2=simple classes, 4=service layer, 5=repository/CQRS"
        typeSafetyTier:
          type: integer
          minimum: 0
          maximum: 3
          description: "0=none, 1=partial hints, 3=comprehensive TypeScript"
        hasDecorators:
          type: boolean
        hasAsyncAwait:
          type: boolean
        hasContextManagers:
          type: boolean
        hasMetaclasses:
          type: boolean
        hasCircuitBreaker:
          type: boolean
        hasDependencyInjection:
          type: boolean
        namingVerbosityScore:
          type: number
          minimum: 0
          maximum: 2
        functionCount:
          type: integer
        classCount:
          type: integer
        averageFunctionLength:
          type: number
        nestingDepth:
          type: integer
        commentRatio:
          type: number

    BaselineResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        contentHash:
          type: string
          description: SHA-256 hash of submitted code
        sophisticationScore:
          type: number
          minimum: 0
          maximum: 100
        metrics:
          $ref: "#/components/schemas/AstMetrics"
        isLocked:
          type: boolean
        submittedAt:
          type: string
          format: date-time

    AssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        title:
          type: string
        weekNumber:
          type: integer
        expectedScore:
          type: number
        dueDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CreateAssignmentRequest:
      type: object
      required: [courseId, title, weekNumber, expectedScore, dueDate]
      properties:
        courseId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 300
        weekNumber:
          type: integer
          minimum: 1
          maximum: 16
        expectedScore:
          type: number
          minimum: 0
          maximum: 100
        dueDate:
          type: string
          format: date-time

    PaginatedAssignments:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AssignmentResponse"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    SubmissionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignmentId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        contentHash:
          type: string
        sophisticationScore:
          type: number
        metrics:
          $ref: "#/components/schemas/AstMetrics"
        submittedAt:
          type: string
          format: date-time
        analysisStatus:
          type: string
          enum: [PENDING, COMPLETE, FAILED]

    PaginatedSubmissions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionResponse"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    AnalysisResultResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
        trajectoryZScore:
          type: number
          description: "Z-score of sophistication delta from expected progression"
        genealogyPenalty:
          type: number
          description: "Cumulative penalty from prerequisite violations (0.5 per violation, max 2.0)"
        cohortOutlierScore:
          type: number
          description: "Normalized cohort outlier signal (0-1)"
        ensembleScore:
          type: number
          description: "Weighted sum: 0.5*trajectory + 0.3*genealogy + 0.2*cohort"
        riskLevel:
          type: string
          enum: [NORMAL, MONITOR, FLAGGED, CRITICAL]
        compressedWeeks:
          type: number
          description: "Equivalent weeks of learning compressed into this submission"
        violations:
          type: array
          items:
            type: object
            properties:
              technique:
                type: string
              missingPrerequisites:
                type: array
                items:
                  type: string
              penalty:
                type: number
        llmGuidance:
          type: string
          nullable: true
          description: "Gemini-generated interview questions for instructor"
        interviewOutcome:
          type: string
          enum: [PENDING, CLEARED, CONFIRMED_AI, ESCALATED]
        interviewNotes:
          type: string
          nullable: true
        analyzedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    PaginatedQueue:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              submissionId:
                type: string
                format: uuid
              studentName:
                type: string
              weekNumber:
                type: integer
              ensembleScore:
                type: number
              riskLevel:
                type: string
                enum: [MONITOR, FLAGGED, CRITICAL]
              topAnomalies:
                type: array
                maxItems: 3
                items:
                  type: string
              interviewOutcome:
                type: string
                enum: [PENDING, CLEARED, CONFIRMED_AI, ESCALATED]
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    QueueJobStatsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                enum: [email, analysis, maintenance]
              counts:
                type: object
                additionalProperties:
                  type: integer
              recentJobs:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    attemptsMade:
                      type: integer
                    timestamp:
                      type: string
                      format: date-time
                    failedReason:
                      type: string
                      nullable: true

    CohortStatsResponse:
      type: object
      properties:
        courseId:
          type: string
          format: uuid
        weekNumber:
          type: integer
        cohortSize:
          type: integer
        avg:
          type: number
        stddev:
          type: number
        p10:
          type: number
        p50:
          type: number
        p90:
          type: number
        outlierThreshold:
          type: number
        distribution:
          type: array
          items:
            type: object
            properties:
              bucket:
                type: string
              count:
                type: integer
